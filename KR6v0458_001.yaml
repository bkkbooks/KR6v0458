body:
  text: 內容提要摩訶婆羅多是印度的一部篇幅巨大的史詩是經過多少代的人的創作和修訂才完成的大約是兩三千年以前的作品故事中心是婆羅多王族的般度的兒子和持國的兒子之間爭奪王國的一次大戰參加這次大戰的還有許多王國和部族大戰前後又有不少的曲折情節這部史詩概括了上古印度社會的各個方面表現了當時的復雜鬥爭包含了大量的神話傳説和政治宗教文化的傳統理論成為包羅萬象的民族史詩對古代和現代的印度人民的生活思想發生了極大的影響是世界文學寶庫中一部輝煌的巨作這一現代改寫本扼要而生動地敘述了大史詩的主要故事也收容了一些插話青年讀者讀了這本書不僅可以欣賞這一偉大文學遺産的重要內容而且可以得到一些關於上古社會的知識增加對於印度人民精神生活的了解由此提高文學修養擴大知識範圍關於印度大史詩摩訶婆羅多大家知道印度是有悠久歷史的一個國家印度的文學作品也非常豐富印度的最古老的書也是最古老的文學作品集是叫做吠陀的四部經典和跟這些經典有關係的許多書這是三千幾百年以前一直到兩千幾百年以前的古書平常稱這些書中所表現的時代為吠陀時代這些古書大致是從氏族社會原始公社到階級社會開始形成和鞏固時期的産物這個時代早已死亡了可是這些古書還一直被印度人認為最神聖的經典現在還是這樣自然不信仰印度教的人不承認這些書是神聖的不過這些人在印度人中不是多數吠陀經典中最晚出的一些書名為奧義書也稱為吠檀多這些書裏的哲學思想後來發展了在近代現代印度很有勢力吠陀時代以後的印度古書中最重要和最有影響的是幾部史詩這些書可以叫做史詩是因為它們的體裁是很長的詩歌而內容又都是以敘述故事為主體可是它們並不是單純的敘事詩歌實際上這些都是古代文化傳統的重要的總結不過採取了文學的形式吧了這一類書中主要的是摩訶婆羅多羅摩衍那還有一些往世書其中最有影響的是薄伽梵往世書往世書産生的時代比較晚表現了新的綜合的傾向主要思想跟前兩部書不相同平常都只把前兩部書叫做古代印度的兩大史詩這兩大史詩尤其是羅摩衍那在近一千年內有了許多現代語言的改寫本現代印度人民中最流行的羅摩衍那並不是原來的用印度古代語言梵語寫的舊詩而是幾百年前許多詩人用各種印度語言寫的新詩其實這些都是利用舊傳統適應新時代的新書只有主要故事還是古書原有的兩部史詩雖然形式相仿可是性質仍不相同羅摩衍那可以説是一個神化的英雄羅摩的傳記寫羅摩的一生事迹中心故事簡單些人物也少些比較接近我們通常所謂史詩梵語的原書在古代印度也被稱為第一部詩摩訶婆羅多不但故事更復雜敘述了許多古代氏族部落國家的興亡而且包括了古代印度文化的各個方面表現了社會生活的種種面貌容納了廣泛的知識理論和教訓還帶有強烈的政治性這簡直是一部詩體的大百科全書古代印度人並不把它叫做詩而是叫做歷史原意是曾經這樣發生過羅摩衍那原書到了現代不如後來的用現代語言改寫的詩那樣流行了可是摩訶婆羅多只是成為無數作品的泉源枝枝節節地部分供後來人利用雖然也有不少現代印度語言的翻譯本和改寫本但是改寫它的書沒有一部能夠代替它事實上也沒有人有過這樣的企圖沒有人能重現它的全部內容改寫的本子不過是傳達一下其中的主要故事或則利用來宣傳自己的觀點而已摩訶婆羅多的意思是偉大的婆羅多族印度在擺脫殖民地地位獲得獨立後規定國名叫做婆羅多這是婆羅多族居住的地方的簡稱是印度的傳統名稱之一它的來源就是這部史詩現代印度人認為摩訶婆羅多是他們的民族史詩這部詩裏面的許多人物和故事是印度人民非常熟悉的一般老百姓雖然不能直接讀梵語的原書不過古代人民可能聽得懂這樣的不太難的文言詩歌可是從迎神賽會節日的史詩演唱中從無數的詩歌戲劇舞蹈和其他文學藝術形式中從現代語言的翻譯本改寫本中仍知道它的內容其實我們應説摩訶婆羅多本來是民間文學藝術創作的一個總結由許多知識分子在古代一個長時期中加上自己的觀點寫下來的因此它的內容在人民中間仍然存在著發展著而書面的結晶又對口頭文學有著影響這樣説大概更加符合事實一個人旅行全印度看到了一切東西可是除非他讀了羅摩衍那和摩訶婆羅多至少是要通過一個好的譯本讀過他不能了解印度的生活方式這話並不完全是誇張的説法摩訶婆羅多原書是一部極長的詩它相當於羅摩衍那的四倍照印度的計算方法它大約有十萬頌一個頌等於我們的四行詩所以照樣分行譯出來就會有四十萬行左右全書分成十八篇各篇有長有短每一篇中又分成一些章用另一些篇名分別概括這些章的內容原書的十八篇列表如下原書的篇始初篇德羅納篇大會篇迦爾納篇森林篇沙利耶篇毗羅吒篇夜襲篇斡旋篇婦女篇毗濕摩篇和平篇教誡篇杵戰篇馬祭篇遠行篇林居篇升天篇這一部大史詩的作者是誰傳統的説法是廣博仙人毗耶沙這顯然是不可靠的照現在流傳的大史詩看來它不可能是一個時期一個作者的作品大概是在很古的年代裏有一首口頭流傳的歌唱一次大戰的史詩後來許多古代傳説都被包容進去了再後來許多人利用這首詩來保存並宣傳文化知識和當時所需要的理論觀點因此又不斷增加新的成分由於時代久遠社會基礎和人與人的關係有了根本改變許多本來不成問題的事成了不可理解的和不能容忍的於是又有人以新時代的觀點來説明傳統的已經神聖化了不可更改的故事這樣長的詩歌顯然不能一次連續唱完勢必分段分節來唱因此書中出現了許多重覆和矛盾現在印度的這部大史詩的傳本很多彼此互有不同這可以證明原書本來是帶有流動性的長時期的集體創作連最古的部分大概也經過長久的不止一人的修訂照這樣看這部大史詩的年代應該隨其中的成分而定書裏有很古的社會現象例如兄弟五人共一妻男的入贅生下兒子又走氏族血統照母系算等等這説明原來的史詩核心記録了上古母系氏族社會還未完全消亡時的一個歷史傳説這本是一首戰爭史詩現在的每篇詩的開頭都有一節同樣的詩説敬禮天神以後就高唱勝利因此有些人以為這史詩本來的名稱是凱歌勝利到發展成為一首巨型長詩時詩題大概是婆羅多婆羅多族之歌再擴大才變為摩訶婆羅多偉大的婆羅多族之歌除了顯然可以證明是後來增加的成分以外照全詩所表現的社會和政治情況看還是在氏族轉變為奴隸制國家的過程之中詩中所謂國王實際只是在不同的社會發展階段上的部落酋長和開始掌握權力的王族奴隸主雖然詩中説般度族和俱盧族同屬婆羅多族但雙方的情形是很不一樣的看來所描寫的不僅是許多部落之間的一場大戰而且是時代矛盾的一次尖鋭衝突雙方對於男女的社會地位對於血統和社會關係對於王位的繼承權利對於戰爭中應守的規則都有不一致的了解甚至相反的看法經濟上還沒有城市和鄉村的明顯對立沒有商業的交換只有聚集居住的城市和分散居住的森林財産主要是牲畜土地和農業的重要性還不十分顯著軍事上技術雖有發展但武器仍然是杵和弓箭為主武士作戰要乘笨重的戰車政治制度和階級關係還不鮮明持國王的兒子難敵也被稱為國王本書中照一般的人習慣稱為太子只有少數幾處稱國王而老王對兒子並無權力族中最年長的毗濕摩也不能支配青年反要服從他一般居民是自由人同時奴隸已經出現社會上分化出來的武士剎帝利和祭司婆羅門分掌軍事和文化已經形成了自由人中的特殊等級不過婆羅門還可以作戰車夫的兒子也能成為武士分別不像後來那樣僵化不能確切證明主要生産勞動是由奴隸進行但可以判斷當時的印度廣大地區中有各種各樣的氏族部落和國家其中有野蠻的氏族被稱為羅剎藥叉夜叉犍達縛等等也有較高級的部落還有初步形成階級統治脫離氏族約束鄙視女性掌握奴隸的地區如象城其代表人就是被斥為貪心極大的難敵以上這些是大史詩的骨幹故事所表現的情況適應這些復雜情況的道德標準也互不相同因此氏族部落國家的衝突包含著社會制度和意識形態的衝突這種矛盾在一次毀滅性的大戰中得到解決時代繼續發展在宗教支配下的社會道德標準也在改變摩訶婆羅多大史詩不能不在形成以後受到新時代的知識分子的修正補充印度教分成一些教派最流行的有兩派一是崇拜毀滅之神大自在天濕婆的一派另一派是崇拜遍入天毗濕奴的這兩派並不是直接互相敵對矛盾的而是各有社會基礎代表著不同傾向而互相補充的古代印度長期存在著原始的農村公社作為國家的基層組織王國分立的時代比較久長統一的大帝國很少能鞏固下來因此反映人間情況的天上的神的關係也是如此宗教中沒有統一的控制一切的上帝而只有各種不同的神但是統一的要求是有的崇拜大神遍入天的一派創造了大神下凡的理論後來集中表現在薄伽梵往世書裏這種理論把羅摩衍那中的英雄羅摩和摩訶婆羅多中的英雄黑天都看作遍入天的化身利用普遍流傳的史詩作為宣傳工具這樣大史詩本是教導王族戰士國家統治者的世俗的書加上了婆羅門祭司所需要保存的文化內容又加上了遍入天一派的宗教和哲學的理論於是詩中的主角之一黑天便由酋長軍師戰士升格為説教者和大神的化身而摩訶婆羅多和羅摩衍那一樣成為宗教的聖典了這一變化的完成可能已在公元開始前後不久這以後還有枝節的補充修正但現在流傳的大史詩的形象已經確定下來了根據現存傳本校勘推定出來的大史詩面目只能到這一階段為止現在對本書中涉及的印度神話社會情況和思想作一些説明神有兩大類一是吠陀時代的神一是後來印度教中的大神吠陀時代的神反映生産力低下的原始社會中人類的想像他們最初只是自然力量的人的形象和對上古英雄的模糊回憶的影子他們只是一些神生不死的人自由自在享樂飲酒作戰後來這些神中有很多都隨著原始社會消逝了留下來的還具有原來的名字和性格但地位遠不如後來的神了吠陀時代的神中最重要的是因陀羅他被稱為天神之王實際上他對其他的神毫無統治的權力不過是一個酋長的反映而已這些天神的敵人後來總稱為阿修羅他們彼此之間經常作戰這明顯是古代氏族的神化天神雖然號稱威力很大但並不能對人施行權力往往還需要人間的幫助他們的行為用後代的眼光看常常是很不道德的在史詩中出現的這一類的神有因陀羅火神風神太陽神等他們名義上是神實際上是人跟我們平常所謂神很不一樣印度教的大神有三個一個是大梵天是創造之神他有四個頭騎一隻天鵝創造了世界可是威力並不很大只能掌管創造一個是濕婆有時用吠陀中的同性質的神名叫他樓陀羅他的稱號很多我們可以只稱他為大自在天這是