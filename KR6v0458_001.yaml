而後面這樣的叫做沙門我們通常所説的沙門專指佛教和尚在印度沙門和尚並不都是佛教的仙人一般是婆羅門家族出身沙門並不要求是婆羅門出身兩者所傳的教義也是對立的後來兩者互相轉化沙門有廟宇住有帝王供養婆羅門也往往遊行教化了印度的佛教衰亡以後沙門差不多成為歷史名詞了於是不論什麼教派的出家修道的人不管是否傳道都被認為出家人在這部大史詩中沙門的教義首先是戒殺即非暴力雖然出現可是沒有提到沙門給王族作祭司和老師的仍是婆羅門仙人沙門這樣的傳統現在印度還有甘地的生活尤其是他在村莊中遊行教化宣傳提倡非暴力即戒殺擴大為不害不傷害人的鬥爭還是運用了人民所熟悉的仙人和沙門的傳統祭祀是婆羅門仙人的重要工作最初是簡單的只是在火裏澆奶油念經誦咒後來生産力提高祭祀發展成為大規模的典禮有時國王還舉行特殊的王祭馬祭等以顯示強大擴充勢力統治者舉行祭祀婆羅門仙人借此得到大量的報酬叫做布施布施後來經仙人們大力歌頌成為重要的德行布施不只在祭祀中接受布施的也不限於仙人了佛教徒也稱贊布施不過不是祭祀中的佛教反對這樣的祭祀仙人的語言既有異乎尋常的力量所以除了預言壞事的詛咒之外還可以預言好事叫做賜恩典表示願望求福便是求恩典在史詩中看來好像賜恩典多半是天神的事而發詛咒多半是仙人的事倣佛彼此有點兒分工至於個人起的誓那叫做誓願也有約束的力量説到必須做到祭祀苦行詛咒恩典都是生産力低下時人類想控制自然力量的願望的産物那時人類生活很困難很不穩定人們在狩獵遊牧耕種等生産活動和日常生活中經常遭遇自然力量的危害因此想像出天神來向他們祈福這是對自然屈服妥協的一方面另一方面他們又想出一些辦法來對自然進行鬥爭有些是實踐中得來的有效的科學技術有些是幻想出來的巫術因為當時的人還不能很快認識並使行動符合自然界的客觀規律所以各種辦法效果往往不穩定不能經常確切判斷那樣一定有效因此巫術和技術時常相混到社會上出現一些通曉和執行這類巫術的人時這些事就神祕化起來這些人就成為當時有文化的人他們和掌握了戰爭技術的有武化的人在生産力提高有可能靠剝削別人勞動來生活的時候就在氏族和公社中奪取權力社會分工轉成了階級分化這些有文化的人宣傳祭祀和苦行的控制自然的力量宣傳所念的經咒的力量一直到宣傳他們所特有的語言的力量説這是生産和生活中不可缺少的支配力量借此增加自己威望鞏固自己地位這兩種人利用氏族社會遺留下來的重視氏族血統的思想把這些特殊社會功能和社會地位跟血統結合起來叫做種姓極力加以鞏固最初種姓只大致分為四個婆羅門是掌握文化的祭司和巫師剎帝利是執掌武器從事戰爭的王族他們結合起來掌握統治權力大史詩中的主要內容便是描述他們的活動一般的公社中的自由人民稱為吠舍這和前兩種都算是上等人從事體力勞動只管生産的人叫做首陀羅被認為下等人算在公社成員以外的奴隸俘虜和外族被認為賤民和野人不算在種姓以內這是最初階級分化時的情況是腦力勞動和體力勞動文化武力和生産彼此分裂而社會上出現等級階級時的情景後來農村公社的組織形式在印度雖然長期存在可是整個社會不斷發展種姓制度表面上維持原來劃分的形式實際內容却日益復雜常有變化在西方殖民主義侵入印度以後公社完全瓦解連形式也不再存在了整個社會生活起了根本的變化但是種姓的殘餘還存在到今天還起著阻撓社會前進的反動作用當然這早已不是史詩中描寫的那樣的種姓了可是人們的意識上還認為是傳統的東西原封未動這部大史詩盡管來源出自民間而且包括了很多民間傳説但是它却掌握在婆羅門剎帝利的手裏經過他們主要是婆羅門的加工以描寫和傳播他們所關心所需要的東西為主要內容染上了他們的片面的色彩就現在的大史詩説它一方面是重要的古代印度歷史文化文學的寶庫另一方面也是古代印度的一部資治通鑒它具有人民性同時也有反動落後的方面原書裏包含的宿命論的觀點有許多顯然不是故事本身必然具有的而是編纂者或加工者的思想原書中還有些透露人民要和命運對抗並戰勝命運的思想生死輪回即死後再托生的思想天堂地獄的想法報應的理論都隨佛教傳到我國是大家都知道的不過報應的理論需要略加説明這是宿命論的一個發展本來命運是神祕不可捉摸的可是後來發展出一種理論主要是佛教的説命運並沒有主宰者只是一種必然規律做什麼事就有什麼結果有了行為叫做業不能不負責任所謂善有善報惡有惡報可是有些事明明不見同類的報應怎樣解釋呢於是聯繫起輪回的理論認為死後再生還要受報所謂若是未報時辰未到這樣想法一方面雖然在某種程度上改變了人對命運的消極順從的態度另一方面又使人屈服於當時的環境仍然把它當作過去行為的報應無法改變所以歸根究底這種理論是教人不要反抗而遵守當時社會的道德規範是服務於統治階級的理論大史詩的故事中不少是並不符合這種理論的但是編纂加工的人却作了很多這樣的解説這種論點在現代印度還很流行大史詩裏廣泛宣傳了正法的思想它所指的是當時社會制度所規定的每一社會成員的社會地位和職責首先是本種姓的職責這是企圖使社會制度永久鞏固的統治階級的理論大史詩的故