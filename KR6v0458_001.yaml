也為迦爾納設祭至今我想起這件事還痛苦不堪我不知道他是我的親哥哥把他害死了我也渴望見到他我看得比我自己的生命還寶貴的怖軍酷似因陀羅本人的阿周那雙生子無種和偕天還有我們的親愛的黑公主他們都堅持正法我渴望看到他們跟他們大家在一起我不希望住在天堂裏離開了他們我在天堂有什麼好呢他們所在的地方對我説就是天堂我的天堂並不在這裏聽到這番話的天仙回答道堅戰阿如果你真想跟他們在一起你立刻就走吧不用耽擱了他們派了一名侍者為他引路使者在前面走堅戰在後面跟他們走著走著周圍就黑暗了在昏暗中隱約可以看到一些怪模怪樣的可怕的東西他穿過一段血漿和腐肉築成的滑膩的道路道路上滿是發臭了的尸體和骨骸還有死人的頭髮到處是蛆蟲在蠕蠕爬動空氣臭不可聞他還到處看到殘肢斷體堅戰很害怕很惶惑他向前走著千萬種感觸折磨著他的心靈我們還要走多遠阿我的兄弟到底在哪裏呢告訴我我的朋友他痛苦極了這樣詢問使者使者淡淡地回答他説如果你想回去我們可以折回去這惡劣的氣息實在難聞有一剎那工夫堅戰真想回去了可是就在這當口仿佛猜到了他的心事似的四面掀起了一片哭喊聲那些聲音他聽來似乎熟悉但又聽不清楚那一片聲音懇求他道堅戰阿別回去至少在這兒再過一會兒吧你在這兒能使我們暫時減輕痛苦你來的時候帶來了一陳甜蜜新鮮的空氣使我們的痛苦略略減輕貢蒂的兒子呀只要看到你我們就能感到安慰就能痛苦得好一些待著吧即使是很短的一段時間也好別回去你在這兒的時候我們的痛苦能暫時消除堅戰站在那裏聽到四周這一片哭喊聲痛苦得不知所措這一片似曾相識的慘痛的叫喊聲使他充滿了憐憫之心他高叫道唉可憐的鬼魂阿你們這樣痛哭哀號到底是誰呢你們是為了什麼上這兒來的國王我是迦爾納有一個聲音這樣回答我是怖軍另一個聲音説我是阿周那第三個高呼的聲音黑公主又一個聲音哀怨地哭喊我是無種我是偕天我們是黑公主的兒子悲慘的聲音從四面八方接連不斷傳來堅戰越來越痛苦終於忍受不下去了他哭道這些人究竟犯了什麼罪呢持國王的兒子難敵又做過了什麼好事呢為什麼持國王的兒子難敵像因陀羅似的端坐在天堂而這些人却要在地獄受罪我是清醒的還是在做夢我的頭腦昏亂了嗎我是瘋了嗎堅戰憤怒極了他咒罵天神痛斥正法他回頭對天神的侍者嚴厲地説回到你主人那兒去我的兄弟沒有犯別的罪只犯了對我忠誠的罪竟被拘留在地獄裏受苦我也要跟他們在一起使者回去把堅戰的話報告了因陀羅這樣過了一天的三十分之一時間堅戰正站在那兒悲苦因陀羅和閻摩出現在他面前他們一來黑暗立即席卷而去可怖的景象也隨之消失罪人和他們所受的苦難也看不到了一陳香風襲來正法之神閻摩笑著向自己的兒子堅戰説大智大慧的人這是我第三次考驗你了你為了弟兄願意留在地獄裏國王和統治者都不免經歷地獄即使時間很短也必須經過一下所以你也注定要經歷一天的三十分之一時間的地獄之苦卓越的阿周那和你所愛的怖軍並不真在地獄裏正直的迦爾納和你認為在地獄受苦的其他的人都不是真在地獄受苦這是考驗你的幻象這不是地獄是天堂你不看見那周遊三界的那羅陀仙人還在那邊嗎別悲傷了閻摩對堅戰説了這一番話後堅戰就從人的形象變成了神凡人的形象一消失忿怒和仇恨等感情亦隨之消逝了無迹象了這時堅戰看到了迦爾納和他其餘的幾個兄弟同時也看到了持國王的兒子們全都儀態安詳毫無恨意成了天神這次重聚使堅戰終於得到了和平和真正幸福
