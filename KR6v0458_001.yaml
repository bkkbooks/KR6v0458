我們它比火熖還厲害它把我和阿周那烤得日夜不能安眠那些用陰謀詭計霸占我們的國土的惡棍現在正在那兒享樂而你呢伏在這裏動也不動就像一條吃飽了的蟒蛇一樣你説我們該遵守諾言可是舉世聞名的阿周那能夠隱姓埋名嗎喜馬拉雅山能躲在一撮青草下面嗎勇猛無畏的阿周那無種和偕天能夠躲藏起來嗎著名的黑公主能走出去不被人認出來嗎縱然我們做了這些不可能做到的事持國王的兒子也會派探子把我們偵查出來的因此之故我們的諾言無論如何不可能完成這只是叫我們再去挨受另一次十三年放逐罷了經典也是支持我這個説法的須知偷竊來的諾言不算是諾言投一把青草給一隻困倦的公牛就足以抵償破壞這樣一種諾言的罪過了你必須立刻下決心去殺敵報仇這是剎帝利的最高天職怖軍一再堅持自己的意見不肯讓步黑公主也總是一再申訴自己在難敵迦爾納和難降手中所遭受的屈辱並且引證經典之言叫堅戰王內心不安堅戰王往往用陳腐的政治理論回答他們並且向他們説明兩方力量的對比他往往説廣聲毗濕摩德羅納迦爾納和馬勇這般人都在敵方陳營內難敵的衆兄弟也都精於戰鬥很多強大的國王現在也站在他們那一邊毗濕摩和德羅納確實對難敵的品質並無好感可是他們不會捨棄他他們還準備為他戰死疆場迦爾納精通一切武藝是個勇敢而又戰術純熟的武士一旦開戰敵我兩方誰勝誰敗不能預定勝利拿不穩就不能性急堅戰王這樣費盡心力去制止弟弟們的急躁情緒過了一些時候阿周那聽從廣博大仙的勸告到喜馬拉雅山去修煉苦行目的在求得天神賜他新的武器他辭別了衆兄弟後就去向黑公主告辭黑公主對他説阿周那阿願你此去獲得成功願天神賜給你在你出生時貢蒂后所希望所祈求的一切我們的幸福生命和榮譽都繫在你一人身上望你得到新武器後就回來黑公主説了一些吉利話給他送行值得注意的是這些話雖然出於妻子黑公主的口實際却是母親貢蒂后的祝福因為話是這末説的願天神賜給你在你出生時貢蒂后所希望所祈求的一切阿周那穿過濃密的森林到了叫做因陀羅峯的一座山上在那兒遇到了一個老婆羅門那修行人滿臉笑容對阿周那親切地説道孩子你身披甲胄手持武器你是誰呀武器在這兒是毫無用處的這兒住的是戰勝了七情六欲的修行人和仙人你穿著剎帝利的服裝來求什麼呢跟阿周那説話的那位婆羅門就是天神之王因陀羅他來這兒為的是見一見自己的兒子阿周那向他的天神父親施禮説道我是來尋求兵器的求你賜給我兵器吧因陀羅回答説阿周那阿兵器有什麼用處請求享受快樂或者升入天堂享福吧阿周那説天神之王阿我不尋求享樂和升天我離開居住在林間的黑公主和衆兄弟來到這裏就為了得到兵器千眼神因陀羅説如果你有福見到三眼神濕婆得到他的眷顧你就會得到天神的兵器了去為濕婆修苦行吧因陀羅這樣説著就忽然不見了於是阿周那跑到喜馬拉雅山去修煉苦行祈求得到大自在天濕婆的眷顧濕婆裝成獵人和他的妻子烏瑪一起到森林裏來打獵他們這場打獵越來越追得迅疾越來越狂熱忽然有一頭野豬驚跳起來去進攻阿周那阿周那就用他的神弓發射一箭射中了這頭野豬就在這同一時刻扮作獵人的濕婆也用他的神弓發射一箭貫穿了這野獸的身體阿周那大聲高叫你是誰你為什麼帶著妻子到這森林裏來遊逛你居然敢射擊我射中的野味嗎這獵人帶著輕蔑口氣回答説我們居住在這兒這個盛産野味的森林是屬於我們的你外表不夠堅強不像一個森林居民你的四肢和舉止都説明你過的是一種舒適奢侈的生活應該由我來問你你耽在這兒幹什麼獵人又説這頭野豬是他射死的如果阿周那不同意歡迎阿周那跟他決一勝負再沒有比戰鬥更能叫阿周那歡喜了他跳起身來就對著濕婆發射出一連串蛇一樣的利箭可是使他大吃一驚的是這些箭不能傷害這位獵人却紛紛墮落像暴風雨時雨點碰到高山頂上就瀉下地來一樣等到已無箭可射時阿周那就拿起神弓去打濕婆可是獵人似乎毫不在意輕輕易易就從他手中把弓扭過去哈哈大笑起來阿周那給一個看來是尋尋常常的林中獵人行若無事地解除了武裝很是慚愧同時也大為震驚幾乎起了疑心可是他還不膽怯又抽出刀來繼續戰鬥刀又給獵人的堅如鐵石的身軀震得粉碎了現在他已沒有武器只能赤手空拳跟這位可怕的陌生人扭打他仍然不是對手獵人的鐵腕把他緊緊捉住緊得叫阿周那毫無辦法脫身阿周那被挫敗了被制服了他便謙卑地祈求神力幫助默想濕婆就在默想的時候忽然靈機一動恍然大悟立刻明白了這個獵人究竟是誰他伏在這位天神腳前用悔恨和崇敬的激動的聲音請求饒恕我饒恕你濕婆笑嘻嘻地説接著把他的神弓和別的從他那兒奪取過來的武器都交還了同時還贈送給阿周那一件神的武器叫獸主之寶阿周那的身體在強弱懸殊的戰鬥中受到損傷但一與三眼神的身軀接觸就完全復原而且比以前體力加強百倍更加光彩耀人濕婆對他説到天上向你的父親因陀羅致敬去吧説完這話大神就像落日一般從眼前消失了阿周那喜出望外高叫道我真的面對面見到了這位天神了嗎我真有如此福份竟接觸了他的神體了嗎那我還想要什麼呢就在這時候因陀羅的車夫摩多梨趕著神車來把阿周那接到天神那兒去了憂患是古來就有的大力羅摩和黑天帶著隨從到般度族所住的森林中去大力羅摩見到了一切情况感到深切的憂傷他對黑天説黑天阿